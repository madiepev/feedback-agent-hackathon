name: Agent Feedback (Phase 3)
description: Evaluate another group's AI feedback agent
title: "[Feedback] Agent: [NAME]"
labels: ["phase-3", "cross-testing"]
body:
  - type: markdown
    attributes:
      value: |
        ## Agent Feedback Form
        
        Rate the agent on 5 criteria using a 5-point scale and provide evidence for each rating.
        
        **Rating Scale:**
        - **5** = Excellent
        - **4** = Good
        - **3** = Adequate
        - **2** = Needs Improvement
        - **1** = Poor
        
  - type: input
    id: agent-name
    attributes:
      label: Agent Name
      description: Enter the name of the feedback agent you tested
      placeholder: "e.g., Science Writing Coach, Feedback Master 3000"
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        ## Criterion 1: Understandability
        *Could you comprehend what the agent was telling you?*

  - type: dropdown
    id: understandability-rating
    attributes:
      label: Rating
      options:
        - "5 - Excellent"
        - "4 - Good"
        - "3 - Adequate"
        - "2 - Needs Improvement"
        - "1 - Poor"
    validations:
      required: true

  - type: textarea
    id: understandability-evidence
    attributes:
      label: Evidence
      description: Provide a specific example or observation that supports your rating
      placeholder: "Example: The agent clearly identified each issue and explained what needed to change, making it easy to understand exactly what was problematic."
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        ## Criterion 2: Specificity
        *Did the agent provide concrete examples vs. vague statements?*

  - type: dropdown
    id: specificity-rating
    attributes:
      label: Rating
      options:
        - "5 - Excellent"
        - "4 - Good"
        - "3 - Adequate"
        - "2 - Needs Improvement"
        - "1 - Poor"
    validations:
      required: true

  - type: textarea
    id: specificity-evidence
    attributes:
      label: Evidence
      description: Provide a specific example or observation that supports your rating
      placeholder: 'Example: The agent quoted my exact text "multiple minerals indicate" and explained specifically what was missing from that statement.'
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        ## Criterion 3: Validity
        *Was the feedback accurate and aligned with the rubric?*

  - type: dropdown
    id: validity-rating
    attributes:
      label: Rating
      options:
        - "5 - Excellent"
        - "4 - Good"
        - "3 - Adequate"
        - "2 - Needs Improvement"
        - "1 - Poor"
    validations:
      required: true

  - type: textarea
    id: validity-evidence
    attributes:
      label: Evidence
      description: Provide a specific example or observation that supports your rating
      placeholder: "Example: The agent correctly identified that my Dimension 2 (Interpretation) was missing significance explanation, which aligned with the rubric criteria."
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        ## Criterion 4: Actionability
        *Could you actually use this feedback to improve?*

  - type: dropdown
    id: actionability-rating
    attributes:
      label: Rating
      options:
        - "5 - Excellent"
        - "4 - Good"
        - "3 - Adequate"
        - "2 - Needs Improvement"
        - "1 - Poor"
    validations:
      required: true

  - type: textarea
    id: actionability-evidence
    attributes:
      label: Evidence
      description: Provide a specific example or observation that supports your rating
      placeholder: 'Example: The agent suggested adding "This discovery matters because..." which gave me a concrete template to follow.'
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        ## Criterion 5: Affective Quality
        *Did the feedback motivate you to improve?*

  - type: dropdown
    id: affective-rating
    attributes:
      label: Rating
      options:
        - "5 - Excellent"
        - "4 - Good"
        - "3 - Adequate"
        - "2 - Needs Improvement"
        - "1 - Poor"
    validations:
      required: true

  - type: textarea
    id: affective-evidence
    attributes:
      label: Evidence
      description: Provide a specific example or observation that supports your rating
      placeholder: "Example: The agent started with positive observations about my content accuracy before suggesting improvements, which felt encouraging rather than discouraging."
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        ## Overall Assessment

  - type: dropdown
    id: overall-rating
    attributes:
      label: Overall Rating
      description: Based on all criteria, how would you rate this agent overall?
      options:
        - "5 - Excellent"
        - "4 - Good"
        - "3 - Adequate"
        - "2 - Needs Improvement"
        - "1 - Poor"
    validations:
      required: true

  - type: textarea
    id: overall-feedback
    attributes:
      label: Overall Feedback
      description: Summarize your experience with this agent. What worked well? What should be improved?
      placeholder: |
        What worked well:
        - Specific quotes from my text helped me understand exactly what to improve
        - Organized feedback by rubric dimensions was easy to follow
        
        What should be improved:
        - Could prioritize which issues to fix first
        - More concrete revision examples would help
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        
        **Thank you!** 🚀 Your feedback helps teams iterate in Phase 4.
        
        **References:**
        - Wu, Y., & Schunn, C. D. (2019). Features of feedback from peer assessors. *Learning and Instruction*.
        - Hattie, J., & Timperley, H. (2007). The power of feedback. *Review of Educational Research*.
